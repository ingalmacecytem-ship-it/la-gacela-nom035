{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center"> <!-- Formulario de registro centrado. -->
    <div class="col-12 col-md-8"> <!-- Columna responsiva. -->
        <div class="card shadow-sm"> <!-- Tarjeta con datos. -->
            <div class="card-body"> <!-- Cuerpo de la tarjeta. -->
                <h2>Registrar Centro de Trabajo</h2>
                {% if mensaje %}
                    <div class="alert alert-success">{{ mensaje }}</div> <!-- Muestra confirmación. -->
                {% endif %}
                <form method="post"> <!-- Envío al servidor. -->
                    <div class="mb-3">
                        <label class="form-label" for="razon_social">Razón social</label>
                        <input class="form-control" id="razon_social" name="razon_social" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="domicilio">Domicilio</label>
                        <input class="form-control" id="domicilio" name="domicilio" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="actividad_principal">Actividad principal</label>
                        <input class="form-control" id="actividad_principal" name="actividad_principal" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="total_trabajadores">Total de trabajadores</label>
                        <input class="form-control" id="total_trabajadores" name="total_trabajadores" type="number" min="1" required>
                    </div>
                    <button class="btn btn-primary">Registrar centro</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
